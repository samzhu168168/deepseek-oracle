services:
  - type: web
    name: deepseek-oracle-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: EMAIL_VERIFY_REQUIRED
        value: false
      - key: INVITE_ONLY
        value: false
      - key: ORACLE_EAST_ONLY_MVP
        value: true
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://deepseek-oracle.vercel.app,http://localhost:5173
      - key: REDIS_URL
        fromService:
          name: deepseek-oracle-redis
          type: redis
          property: connectionString

  - type: redis
    name: deepseek-oracle-redis
    plan: free
    ipAllowList: []
