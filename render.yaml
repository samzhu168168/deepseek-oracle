services:
  - type: web
    name: deepseek-oracle-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: EMAIL_VERIFY_REQUIRED
        value: false
      - key: INVITE_ONLY
        value: false
      - key: ORACLE_EAST_ONLY_MVP
        value: true
      - key: DEBUG
        value: false
      - key: REDIS_URL
        fromService:
          name: deepseek-oracle-redis
          type: pserv
          property: connectionString

  - type: pserv
    name: deepseek-oracle-redis
    env: docker
    dockerCommand: redis-server
    disk:
      name: redis-data
      mountPath: /data
      sizeGB: 1
